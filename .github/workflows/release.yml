name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-standard:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: kiro-cortex-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: kiro-cortex-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: kiro-cortex-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: kiro-cortex-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: kiro-cortex-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build (standard)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/kiro-cortex ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\kiro-cortex.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-embedding:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: kiro-cortex-embedding-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: kiro-cortex-embedding-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build (with embedding)
        run: cargo build --release --features embedding --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/kiro-cortex ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\kiro-cortex.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [build-standard, build-embedding]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Downloads

            ### Standard (Guard + Proxy + Memory with BM25 search)
            | OS | File | Size |
            |---|---|---|
            | Linux x64 | `kiro-cortex-linux-x64` | ~7MB |
            | Linux ARM64 | `kiro-cortex-linux-arm64` | ~7MB |
            | macOS Intel | `kiro-cortex-macos-x64` | ~7MB |
            | macOS Apple Silicon | `kiro-cortex-macos-arm64` | ~7MB |
            | Windows x64 | `kiro-cortex-windows-x64.exe` | ~7MB |

            ### With Embedding (adds hybrid BM25 + vector semantic search)
            | OS | File | Size |
            |---|---|---|
            | Linux x64 | `kiro-cortex-embedding-linux-x64` | ~33MB |
            | macOS Apple Silicon | `kiro-cortex-embedding-macos-arm64` | ~33MB |

            > Windows / macOS Intel: build from source with `cargo build --release --features embedding`

            After downloading the embedding version, run `kiro-cortex memory init` to download the model (~22MB).
